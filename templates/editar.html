<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Editar Animal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-5">

                    <h1 class="mb-4 text-center">

                        Editar Animal

                    </h1>

                    <form
                    action="/actualizar/{{ mascota.id }}"
                    method="POST">

                        <!-- NOMBRE -->

                        <div class="mb-3">

                            <label class="form-label">

                                Nombre

                            </label>

                            <input
                            type="text"
                            name="nombre"
                            class="form-control"
                            value="{{ mascota.nombre }}"
                            required>

                        </div>

                        <!-- EDAD -->

                        <div class="mb-3">

                            <label class="form-label">

                                Edad

                            </label>

                            <input
                            type="number"
                            name="edad"
                            class="form-control"
                            value="{{ mascota.edad }}"
                            required>

                        </div>

                        <!-- TIPO -->

                        <div class="mb-3">

                            <label class="form-label">

                                Tipo

                            </label>

                            <input
                            type="text"
                            name="tipo"
                            class="form-control"
                            value="{{ mascota.tipo }}"
                            required>

                        </div>

                        <!-- RAZA -->

                        <div class="mb-3">

                            <label class="form-label">

                                Raza

                            </label>

                            <input
                            type="text"
                            name="raza"
                            class="form-control"
                            value="{{ mascota.raza }}"
                            required>

                        </div>

                        <!-- SALUD -->

                        <div class="mb-3">

                            <label class="form-label">

                                Estado de salud

                            </label>

                            <input
                            type="text"
                            name="estado_salud"
                            class="form-control"
                            value="{{ mascota.estado_salud }}"
                            required>

                        </div>

                        <!-- DESCRIPCION -->

                        <div class="mb-4">

                            <label class="form-label">

                                Descripción

                            </label>

                            <textarea
                            name="descripcion"
                            class="form-control">{{ mascota.descripcion }}</textarea>

                        </div>

                        <!-- BOTON -->

                        <button class="btn btn-primary w-100">

                            Guardar Cambios

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
