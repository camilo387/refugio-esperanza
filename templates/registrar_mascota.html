<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registrar Mascota</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#f5f7fb;
        }

        .form-container{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px 0;
        }

        .card-form{
            background:white;
            border-radius:30px;
            overflow:hidden;
            box-shadow:0 20px 50px rgba(0,0,0,0.1);
        }

        .left-side{
            background:linear-gradient(135deg,#22c55e,#16a34a);
            color:white;
            padding:50px;
            height:100%;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .left-side h1{
            font-size:50px;
            font-weight:700;
            margin-bottom:20px;
        }

        .left-side p{
            font-size:18px;
            line-height:1.8;
            opacity:0.9;
        }

        .left-side img{
            width:100%;
            margin-top:30px;
            border-radius:20px;
            object-fit:cover;
            height:300px;
        }

        .right-side{
            padding:50px;
        }

        .form-title{
            font-size:40px;
            font-weight:700;
            color:#0f172a;
            margin-bottom:35px;
        }

        .form-label{
            font-weight:600;
            color:#334155;
            margin-bottom:10px;
        }

        .form-control{
            height:55px;
            border-radius:15px;
            border:1px solid #cbd5e1;
            padding-left:20px;
            margin-bottom:20px;
        }

        textarea.form-control{
            height:120px;
            resize:none;
            padding-top:15px;
        }

        .form-control:focus{
            box-shadow:none;
            border-color:#22c55e;
        }

        .btn-register{
            background:#22c55e;
            border:none;
            height:55px;
            border-radius:15px;
            font-size:18px;
            font-weight:600;
            transition:0.3s;
        }

        .btn-register:hover{
            background:#16a34a;
            transform:translateY(-3px);
        }

        .back-link{
            text-decoration:none;
            color:#64748b;
            font-weight:500;
        }

        .back-link:hover{
            color:#22c55e;
        }

        @media(max-width:992px){

            .left-side{
                display:none;
            }

            .right-side{
                padding:35px;
            }
        }

    </style>

</head>

<body>

    <div class="container form-container">

        <div class="row w-100 justify-content-center">

            <div class="col-lg-11">

                <div class="card-form">

                    <div class="row g-0">

                        <!-- LADO IZQUIERDO -->

                        <div class="col-lg-5">

                            <div class="left-side">

                                <h1>

                                    🐾 Nueva Mascota

                                </h1>

                                <p>

                                    Registra una nueva mascota para ayudarle a encontrar un hogar lleno de amor y cuidado.

                                </p>

                                <img
                                src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=1200&auto=format&fit=crop">

                            </div>

                        </div>

                        <!-- LADO DERECHO -->

                        <div class="col-lg-7">

                            <div class="right-side">

                                <a href="/" class="back-link">

                                    <i class="bi bi-arrow-left"></i>

                                    Volver al inicio

                                </a>

                                <h2 class="form-title mt-3">

                                    Registrar Mascota

                                </h2>

                                <!-- FORMULARIO -->

                                <form
                                action="/guardar-mascota"
                                method="POST"
                                enctype="multipart/form-data">

                                    <!-- NOMBRE -->

                                    <label class="form-label">

                                        Nombre

                                    </label>

                                    <input
                                    type="text"
                                    name="nombre"
                                    class="form-control"
                                    placeholder="Ej: Max"
                                    required>

                                    <!-- EDAD -->

                                    <label class="form-label">

                                        Edad

                                    </label>

                                    <input
                                    type="number"
                                    name="edad"
                                    class="form-control"
                                    placeholder="Ej: 3"
                                    required>

                                    <!-- TIPO -->

                                    <label class="form-label">

                                        Tipo

                                    </label>

                                    <input
                                    type="text"
                                    name="tipo"
                                    class="form-control"
                                    placeholder="Ej: Perro"
                                    required>

                                    <!-- RAZA -->

                                    <label class="form-label">

                                        Raza

                                    </label>

                                    <input
                                    type="text"
                                    name="raza"
                                    class="form-control"
                                    placeholder="Ej: Labrador"
                                    required>

                                    <!-- SALUD -->

                                    <label class="form-label">

                                        Estado de salud

                                    </label>

                                    <input
                                    type="text"
                                    name="estado_salud"
                                    class="form-control"
                                    placeholder="Ej: Vacunado"
                                    required>

                                    <!-- DESCRIPCION -->

                                    <label class="form-label">

                                        Descripción

                                    </label>

                                    <textarea
                                    name="descripcion"
                                    class="form-control"
                                    placeholder="Describe la mascota"></textarea>

                                    <!-- FOTO -->

                                    <label class="form-label mt-3">

                                        Foto de la mascota

                                    </label>

                                    <input
                                    type="file"
                                    name="foto"
                                    class="form-control"
                                    accept="image/*"
                                    required>

                                    <!-- BOTON -->

                                    <button class="btn btn-success btn-register w-100 mt-4">

                                        <i class="bi bi-heart-fill"></i>

                                        Registrar Mascota

                                    </button>

                                </form>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
