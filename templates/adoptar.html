<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulario de Adopción</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow border-0 rounded-4">

                <div class="card-body p-5">

                    <h1 class="mb-4 text-center">

                        Adoptar a {{ nombre }} ❤️

                    </h1>

                    <form
                    action="/guardar-adopcion"
                    method="POST">

                        <input
                        type="hidden"
                        name="mascota"
                        value="{{ nombre }}">

                        <div class="mb-3">

                            <label>

                                Nombre completo

                            </label>

                            <input
                            type="text"
                            name="nombre"
                            class="form-control"
                            required>

                        </div>

                        <div class="mb-3">

                            <label>

                                Teléfono

                            </label>

                            <input
                            type="text"
                            name="telefono"
                            class="form-control"
                            required>

                        </div>

                        <div class="mb-3">

                            <label>

                                Correo

                            </label>

                            <input
                            type="email"
                            name="correo"
                            class="form-control"
                            required>

                        </div>

                        <div class="mb-4">

                            <label>

                                Dirección

                            </label>

                            <textarea
                            name="direccion"
                            class="form-control"
                            required></textarea>

                        </div>

                        <button class="btn btn-success w-100">

                            Confirmar Adopción ❤️

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
