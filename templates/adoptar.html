<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Formulario de Adopción</title>

    <!-- Bootstrap -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->

    <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

    <style>

        *{
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#f5f7fb;
        }

        /* NAVBAR */

        .navbar{
            background:#0f172a;
        }

        .navbar-brand{
            font-size:28px;
            font-weight:700;
            color:white !important;
        }

        .navbar-brand span{
            color:#22c55e;
        }

        /* CARD FORMULARIO */

        .form-container{

            background:white;

            border-radius:30px;

            padding:50px;

            box-shadow:0 15px 40px rgba(0,0,0,0.08);

        }

        /* TITULO */

        .title{

            font-size:50px;

            font-weight:700;

            color:#0f172a;

        }

        .title span{

            color:#22c55e;

        }

        /* INPUTS */

        .form-control{

            border-radius:14px;

            padding:14px;

            border:1px solid #dbe4ee;

        }

        .form-control:focus{

            box-shadow:none;

            border-color:#22c55e;

        }

        /* BOTON */

        .btn-adoptar{

            background:#22c55e;

            color:white;

            border:none;

            padding:14px;

            border-radius:14px;

            font-size:18px;

            font-weight:600;

            transition:0.3s;

        }

        .btn-adoptar:hover{

            background:#16a34a;

            transform:translateY(-2px);

        }

        /* ICONO */

        .icon-box{

            width:100px;

            height:100px;

            background:#22c55e;

            color:white;

            border-radius:50%;

            display:flex;

            align-items:center;

            justify-content:center;

            font-size:45px;

            margin:auto;

            margin-bottom:25px;

        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark py-3">

        <div class="container">

            <a class="navbar-brand" href="/">

                🐾 Refugio <span>Esperanza</span>

            </a>

        </div>

    </nav>

    <!-- CONTENIDO -->

    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="form-container">

                    <!-- ICONO -->

                    <div class="icon-box">

                        <i class="bi bi-heart-fill"></i>

                    </div>

                    <!-- TITULO -->

                    <div class="text-center mb-5">

                        <h1 class="title">

                            Adoptar a <span>{{ nombre }}</span>

                        </h1>

                        <p class="text-muted mt-3">

                            Completa el formulario para iniciar el proceso de adopción ❤️

                        </p>

                    </div>

                    <!-- FORMULARIO -->

                    <form
                    action="/guardar-adopcion"
                    method="POST">

                        <!-- NOMBRE MASCOTA -->

                        <input
                        type="hidden"
                        name="mascota"
                        value="{{ nombre }}">

                        <!-- NOMBRE -->

                        <div class="mb-4">

                            <label class="form-label">

                                Nombre completo

                            </label>

                            <input
                            type="text"
                            name="nombre"
                            class="form-control"
                            required>

                        </div>

                        <!-- TELEFONO -->

                        <div class="mb-4">

                            <label class="form-label">

                                Teléfono

                            </label>

                            <input
                            type="text"
                            name="telefono"
                            class="form-control"
                            required>

                        </div>

                        <!-- CORREO -->

                        <div class="mb-4">

                            <label class="form-label">

                                Correo electrónico

                            </label>

                            <input
                            type="email"
                            name="correo"
                            class="form-control"
                            required>

                        </div>

                        <!-- DIRECCION -->

                        <div class="mb-4">

                            <label class="form-label">

                                Dirección

                            </label>

                            <textarea
                            name="direccion"
                            rows="4"
                            class="form-control"
                            required></textarea>

                        </div>

                        <!-- BOTON -->

                        <button
                        type="submit"
                        class="btn btn-adoptar w-100">

                            <i class="bi bi-heart-fill"></i>

                            Enviar solicitud de adopción

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
