<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Solicitudes</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <h1 class="mb-5">

        Solicitudes de Adopción 🐾

    </h1>

    <table class="table table-bordered bg-white">

        <thead>

            <tr>

                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>Dirección</th>
                <th>Mascota</th>
                <th>Estado</th>
                <th>Acción</th>

            </tr>

        </thead>

        <tbody>

            {% for s in solicitudes %}

            <tr>

                <td>{{ s[1] }}</td>
                <td>{{ s[2] }}</td>
                <td>{{ s[3] }}</td>
                <td>{{ s[4] }}</td>
                <td>{{ s[5] }}</td>
                <td>{{ s[6] }}</td>

                <td>

                    {% if s[6] == "Pendiente" %}

                    <a
                    href="/aprobar-adopcion/{{ s[0] }}/{{ s[5] }}"
                    class="btn btn-success">

                        Aprobar

                    </a>

                    {% else %}

                    <span class="text-success">

                        Aprobada

                    </span>

                    {% endif %}

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>

</html>
